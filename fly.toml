app = "ai-text-xray"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.backend"

[env]
  HOST = "0.0.0.0"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"

[mounts]
  source = "model_data"
  destination = "/data"
